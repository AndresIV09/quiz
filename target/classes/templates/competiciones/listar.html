<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competiciones</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --purple-dark:   #2d1b69;
      --purple-mid:    #5b2d8e;
      --purple-light:  #7c3aed;
      --blue-dark:     #1e3a5f;
      --blue-mid:      #1d4ed8;
      --blue-light:    #3b82f6;
      --accent:        #a78bfa;
    }
    body { background-color: #f0eeff !important; }
    .navbar.bg-dark { background: linear-gradient(90deg, var(--purple-dark), var(--blue-dark)) !important; }
    .navbar-brand, .nav-link { color: #e2d9ff !important; }
    .nav-link:hover { color: #ffffff !important; }
    .btn-outline-warning { border-color: var(--accent); color: var(--accent); }
    .btn-outline-warning:hover { background-color: var(--accent); color: #fff; }

    /* Hero section */
    .hero { background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple-mid) 50%, var(--blue-dark) 100%) !important; }

    /* Stat cards */
    .card-clubes    { background: linear-gradient(135deg, #5b2d8e, #7c3aed) !important; }
    .card-jugadores { background: linear-gradient(135deg, #3b82f6, #1d4ed8) !important; }
    .card-entrena   { background: linear-gradient(135deg, #7c3aed, #3b82f6) !important; }
    .card-asoc      { background: linear-gradient(135deg, #1d4ed8, #5b2d8e) !important; }
    .card-comp      { background: linear-gradient(135deg, #a78bfa, #5b2d8e) !important; }

    /* Quick action buttons on index */
    .btn-primary    { background-color: var(--blue-mid)   !important; border-color: var(--blue-mid)   !important; }
    .btn-primary:hover { background-color: var(--blue-dark) !important; border-color: var(--blue-dark) !important; }
    .btn-danger     { background-color: var(--purple-mid)  !important; border-color: var(--purple-mid)  !important; }
    .btn-danger:hover { background-color: var(--purple-dark) !important; border-color: var(--purple-dark) !important; }
    .btn-info       { background-color: #6366f1 !important; border-color: #6366f1 !important; color: #fff !important; }
    .btn-info:hover { background-color: #4f46e5 !important; border-color: #4f46e5 !important; }
    .btn-success    { background-color: #4338ca !important; border-color: #4338ca !important; }
    .btn-success:hover { background-color: #3730a3 !important; border-color: #3730a3 !important; }
    .btn-warning    { background-color: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
    .btn-warning:hover { background-color: #7c3aed !important; border-color: #7c3aed !important; }

    /* Outline buttons */
    .btn-outline-primary  { color: var(--blue-mid)   !important; border-color: var(--blue-mid)   !important; }
    .btn-outline-primary:hover  { background-color: var(--blue-mid)   !important; color: #fff !important; }
    .btn-outline-secondary { color: #6d5fb0 !important; border-color: #6d5fb0 !important; }
    .btn-outline-secondary:hover { background-color: #6d5fb0 !important; color: #fff !important; }
    .btn-outline-danger   { color: var(--purple-light) !important; border-color: var(--purple-light) !important; }
    .btn-outline-danger:hover   { background-color: var(--purple-light) !important; color: #fff !important; }

    /* Cards and tables */
    .card { border: none !important; }
    .card-header.bg-primary { background: linear-gradient(135deg, var(--blue-mid), var(--purple-light)) !important; }
    .card-header.bg-success { background: linear-gradient(135deg, var(--purple-mid), var(--blue-mid)) !important; }
    .card-header.bg-info    { background: linear-gradient(135deg, var(--blue-light), var(--purple-light)) !important; color: #fff !important; }
    .card-header.bg-warning { background: linear-gradient(135deg, var(--accent), var(--purple-mid)) !important; color: #fff !important; }
    .table thead.table-dark, thead.table-dark th { background-color: var(--purple-dark) !important; }

    /* Badges */
    .badge.bg-primary  { background-color: var(--blue-mid)   !important; }
    .badge.bg-success  { background-color: var(--purple-mid)  !important; }
    .badge.bg-info     { background-color: #6366f1 !important; color: #fff !important; }
    .badge.bg-warning  { background-color: var(--accent) !important; color: #fff !important; }
    .badge.bg-secondary { background-color: #6d5fb0 !important; }
    .badge.bg-danger   { background-color: var(--purple-light) !important; }

    /* Alerts */
    .alert-success { background-color: #ede9fe !important; border-color: var(--accent) !important; color: var(--purple-dark) !important; }
    .alert-danger  { background-color: #f0e6ff !important; border-color: var(--purple-light) !important; color: var(--purple-dark) !important; }

    /* Footer */
    footer.bg-dark { background: linear-gradient(90deg, var(--purple-dark), var(--blue-dark)) !important; }

    /* Detail cards */
    .card.border-primary { border-color: var(--blue-light) !important; }
    .card-header.bg-primary.bg-opacity-10 { background-color: #dbeafe !important; color: var(--blue-dark) !important; }

    /* Form focus */
    .form-control:focus, .form-select:focus {
      border-color: var(--purple-light) !important;
      box-shadow: 0 0 0 0.25rem rgba(124, 58, 237, 0.25) !important;
    }

    /* Links */
    a:not(.btn):not(.nav-link):not(.navbar-brand) { color: var(--purple-light); }
    a:not(.btn):not(.nav-link):not(.navbar-brand):hover { color: var(--blue-mid); }

    /* Table row hover */
    .table-hover tbody tr:hover { background-color: #ede9fe !important; }

    /* Headings with text-primary */
    .text-primary { color: var(--blue-mid) !important; }
    h2 .text-primary, h2.text-primary { color: var(--purple-light) !important; }
  </style>
</head>
<body class="bg-light">
  <nav th:replace="~{fragments/navbar :: navbar}"></nav>
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-bold mb-0"><i class="bi bi-award-fill text-warning me-2"></i>Competiciones</h2>
        <small class="text-muted">Torneos y competencias disponibles</small>
      </div>
      <a th:href="@{/competiciones/nuevo}" class="btn btn-warning"><i class="bi bi-plus-circle me-1"></i>Nueva Competición</a>
    </div>
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-body p-0">
        <div th:if="${competiciones.isEmpty()}" class="text-center py-5 text-muted">
          <i class="bi bi-award display-3 mb-3 d-block"></i>
          <p>No hay competiciones registradas. <a th:href="@{/competiciones/nuevo}">¡Agrega la primera!</a></p>
        </div>
        <div class="table-responsive" th:unless="${competiciones.isEmpty()}">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr><th>#</th><th>Nombre</th><th>Premio ($)</th><th>Fecha Inicio</th><th>Fecha Fin</th><th class="text-center">Acciones</th></tr>
            </thead>
            <tbody>
              <tr th:each="c : ${competiciones}">
                <td class="text-muted small" th:text="${c.id}"></td>
                <td class="fw-semibold" th:text="${c.nombre}"></td>
                <td th:text="${#numbers.formatInteger(c.montoPremio, 1, 'COMMA')}"></td>
                <td th:text="${c.fechaInicio}"></td>
                <td th:text="${c.fechaFin}"></td>
                <td class="text-center">
                  <a th:href="@{/competiciones/editar/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                  <a th:href="@{/competiciones/eliminar/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar esta competición?')"><i class="bi bi-trash"></i></a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
